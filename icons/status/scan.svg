<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <!-- Radar rings, innermost to outermost -->
  <circle cx="12" cy="12" r="3.5"  stroke="#06d6e0" stroke-width="1" opacity="0.5"/>
  <circle cx="12" cy="12" r="7"    stroke="#06d6e0" stroke-width="1" opacity="0.35"/>
  <circle cx="12" cy="12" r="10.5" stroke="#06d6e0" stroke-width="1" opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="#06d6e0"/>
  <!-- Sweep arm -->
  <line x1="12" y1="12" x2="19.5" y2="4.5"
        stroke="#06d6e0" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
</svg>
