<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sp-rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"    stop-color="#ff3d00"/>
      <stop offset="16.6%" stop-color="#ff9100"/>
      <stop offset="33.3%" stop-color="#ffd600"/>
      <stop offset="50%"   stop-color="#00e676"/>
      <stop offset="66.6%" stop-color="#448aff"/>
      <stop offset="83.3%" stop-color="#b24bf3"/>
      <stop offset="100%"  stop-color="#ff2d95"/>
    </linearGradient>
    <filter id="sp-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow halo -->
  <path d="M32 4L8 16v16c0 14 10 26 24 30 14-4 24-16 24-30V16L32 4z"
        fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.3"
        filter="url(#sp-glow)"/>

  <!-- Shield body -->
  <path d="M32 6L10 17v15c0 13 9.5 24.5 22 28 12.5-3.5 22-15 22-28V17L32 6z"
        fill="#111128" stroke="url(#sp-rainbow)" stroke-width="2.5"/>

  <!-- Rainbow wash -->
  <path d="M32 6L10 17v15c0 13 9.5 24.5 22 28 12.5-3.5 22-15 22-28V17L32 6z"
        fill="url(#sp-rainbow)" opacity="0.12"/>

  <!-- Padlock body -->
  <rect x="22" y="30" width="20" height="16" rx="3"
        fill="url(#sp-rainbow)" opacity="0.9"/>

  <!-- Padlock shackle -->
  <path d="M26 30v-5a6 6 0 0 1 12 0v5"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"
        fill="none" opacity="0.95"/>

  <!-- Keyhole -->
  <circle cx="32" cy="37" r="2.5" fill="#0a0a1a" opacity="0.9"/>
  <rect x="31" y="37" width="2" height="4" rx="1" fill="#0a0a1a" opacity="0.7"/>

  <!-- Top highlight -->
  <path d="M32 6L10 17v6c6-2 14-4 22-4s16 2 22 4v-6L32 6z"
        fill="white" opacity="0.08"/>
</svg>
